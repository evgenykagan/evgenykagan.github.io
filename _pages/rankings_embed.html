<div class="rankings-controls">
  <div class="control-group">
    <label>Time Period:</label>
    <select id="period-select">
      <option value="5yr" selected>Last 5 Years (2022&ndash;2026)</option>
      <option value="10yr">Last 10 Years (2017&ndash;2026)</option>
      <option value="roll_2016_2020">Rolling 5 Years (2016&ndash;2020)</option>
      <option value="roll_2017_2021">Rolling 5 Years (2017&ndash;2021)</option>
      <option value="roll_2018_2022">Rolling 5 Years (2018&ndash;2022)</option>
      <option value="roll_2019_2023">Rolling 5 Years (2019&ndash;2023)</option>
      <option value="roll_2020_2024">Rolling 5 Years (2020&ndash;2024)</option>
      <option value="roll_2021_2025">Rolling 5 Years (2021&ndash;2025)</option>
      <option value="roll_2022_2026">Rolling 5 Years (2022&ndash;2026)</option>
    </select>
  </div>
  <div class="control-group">
    <label>Journals:</label>
    <span class="checkbox-group">
      <label><input type="checkbox" class="journal-cb" value="mansci" checked> Management Science (OM/OR papers only)</label>
      <label><input type="checkbox" class="journal-cb" value="or" checked> Operations Research</label>
      <label><input type="checkbox" class="journal-cb" value="msom" checked> M&amp;SOM</label>
    </span>
  </div>
</div>

<table id="rankings-table">
  <thead>
    <tr class="header-group">
      <th colspan="2" class="no-group"></th>
      <th colspan="2">OM Faculty Count</th>
      <th colspan="4">Productivity</th>
    </tr>
    <tr>
      <th data-col="rank"># <span class="sort-arrow"></span></th>
      <th data-col="name">School <span class="sort-arrow"></span></th>
      <th data-col="faculty">Total <span class="sort-arrow"></span></th>
      <th data-col="ranks">Asst/<br>Assoc/<br>Full <span class="sort-arrow"></span></th>
      <th data-col="papers_school_per_year">Papers<br>/ School<br>/ Year <span class="sort-arrow"></span></th>
      <th data-col="papers_faculty_per_year">Papers<br>/ Faculty<br>/ Year <span class="sort-arrow"></span></th>
      <th data-col="citations_school_per_year">Citations<br>/ School<br>/ Year <span class="sort-arrow"></span></th>
      <th data-col="citations_faculty_per_year">Citations<br>/ Faculty<br>/ Year <span class="sort-arrow"></span></th>
    </tr>
  </thead>
  <tbody id="rankings-body"></tbody>
</table>

<script>
(function() {
  var data = {{ site.data.rankings_data | jsonify }};
  var schools = data.schools;
  var sortCol = 'papers_faculty_per_year';
  var sortAsc = false;
  var schoolYearMetrics = {};

  function getSelectedJournals() {
    var cbs = document.querySelectorAll('.journal-cb:checked');
    return Array.prototype.map.call(cbs, function(cb) { return cb.value; });
  }

  function getPeriod() {
    return document.getElementById('period-select').value;
  }

  function getPeriodBounds(periodKey) {
    if (periodKey.indexOf('roll_') === 0) {
      var years = periodKey.replace('roll_', '').split('_');
      return {
        from: parseInt(years[0], 10),
        to: parseInt(years[1], 10),
        years: parseInt(years[1], 10) - parseInt(years[0], 10) + 1
      };
    }
    return data.time_periods[periodKey];
  }

  function parseCsv(text) {
    var lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    var headers = lines[0].split(',');
    var out = [];
    for (var i = 1; i < lines.length; i++) {
      if (!lines[i]) continue;
      var cols = lines[i].split(',');
      var row = {};
      for (var j = 0; j < headers.length; j++) {
        row[headers[j]] = cols[j] || '';
      }
      out.push(row);
    }
    return out;
  }

  function loadMetricData(callback) {
    fetch('/data_work/school_year_metrics_combined.csv?ts=' + Date.now())
      .then(function(resp) { return resp.text(); })
      .then(function(text) {
        var rows = parseCsv(text);
        schoolYearMetrics = {};
        rows.forEach(function(r) {
          var school = r.rankings_school;
          var year = r.year;
          if (!schoolYearMetrics[school]) schoolYearMetrics[school] = {};
          schoolYearMetrics[school][year] = {
            ms_std_papers: parseFloat(r.ms_std_papers || '0') || 0,
            ms_personal_papers: parseFloat(r.ms_personal_papers || '0') || 0,
            ms_std_citations: parseFloat(r.ms_std_citations || '0') || 0,
            or_std_papers: parseFloat(r.or_std_papers || '0') || 0,
            or_personal_papers: parseFloat(r.or_personal_papers || '0') || 0,
            or_std_citations: parseFloat(r.or_std_citations || '0') || 0,
            msom_std_papers: parseFloat(r.msom_std_papers || '0') || 0,
            msom_personal_papers: parseFloat(r.msom_personal_papers || '0') || 0,
            msom_std_citations: parseFloat(r.msom_std_citations || '0') || 0
          };
        });
      })
      .catch(function() {
        schoolYearMetrics = {};
      })
      .finally(function() {
        callback();
      });
  }

  function sumSchoolMetric(schoolName, fromYear, toYear, metricKey) {
    if (!schoolYearMetrics[schoolName]) return 0;
    var total = 0;
    for (var y = fromYear; y <= toYear; y++) {
      var rec = schoolYearMetrics[schoolName][String(y)];
      if (rec) total += (rec[metricKey] || 0);
    }
    return total;
  }

  function formatNumber(value) {
    var rounded = Math.round(value * 100) / 100;
    if (Math.abs(rounded - Math.round(rounded)) < 1e-9) return String(Math.round(rounded));
    if (Math.abs(rounded * 10 - Math.round(rounded * 10)) < 1e-9) return rounded.toFixed(1);
    return rounded.toFixed(2);
  }

  function computeMetrics(s, period, journals) {
    var bounds = getPeriodBounds(period);
    var fromYear = bounds.from;
    var toYear = bounds.to;
    var years = bounds.years;
    var faculty = s.faculty.assistant + s.faculty.associate + s.faculty.full;

    var papersSchoolLevel = 0;
    var papersFacultyLevel = 0;
    var citationsSchoolLevel = 0;

    if (journals.indexOf('mansci') >= 0) {
      papersSchoolLevel += sumSchoolMetric(s.name, fromYear, toYear, 'ms_std_papers');
      papersFacultyLevel += sumSchoolMetric(s.name, fromYear, toYear, 'ms_personal_papers');
      citationsSchoolLevel += sumSchoolMetric(s.name, fromYear, toYear, 'ms_std_citations');
    }
    if (journals.indexOf('or') >= 0) {
      papersSchoolLevel += sumSchoolMetric(s.name, fromYear, toYear, 'or_std_papers');
      papersFacultyLevel += sumSchoolMetric(s.name, fromYear, toYear, 'or_personal_papers');
      citationsSchoolLevel += sumSchoolMetric(s.name, fromYear, toYear, 'or_std_citations');
    }
    if (journals.indexOf('msom') >= 0) {
      papersSchoolLevel += sumSchoolMetric(s.name, fromYear, toYear, 'msom_std_papers');
      papersFacultyLevel += sumSchoolMetric(s.name, fromYear, toYear, 'msom_personal_papers');
      citationsSchoolLevel += sumSchoolMetric(s.name, fromYear, toYear, 'msom_std_citations');
    }

    return {
      name: s.name,
      full_name: s.full_name,
      assistant: s.faculty.assistant,
      associate: s.faculty.associate,
      full: s.faculty.full,
      faculty: faculty,
      ranks: s.faculty.assistant + '/' + s.faculty.associate + '/' + s.faculty.full,
      papers_school_per_year: papersSchoolLevel / years,
      papers_faculty_per_year: faculty > 0 ? papersFacultyLevel / faculty / years : 0,
      citations_school_per_year: citationsSchoolLevel / years,
      citations_faculty_per_year: faculty > 0 ? citationsSchoolLevel / faculty / years : 0
    };
  }

  function sortData(rows) {
    rows.sort(function(a, b) {
      var av = a[sortCol];
      var bv = b[sortCol];
      var cmp;
      if (typeof av === 'string') {
        cmp = av.localeCompare(bv);
      } else {
        cmp = av - bv;
      }
      if (!sortAsc) cmp = -cmp;
      if (cmp !== 0) return cmp;
      return a.name.localeCompare(b.name);
    });
    return rows;
  }

  function render() {
    var period = getPeriod();
    var journals = getSelectedJournals();
    var rows = schools.map(function(s) { return computeMetrics(s, period, journals); });
    sortData(rows);

    var tbody = document.getElementById('rankings-body');
    tbody.innerHTML = '';

    rows.forEach(function(r, idx) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="num">' + (idx + 1) + '</td>' +
        '<td>' + r.name + '</td>' +
        '<td class="num">' + r.faculty + '</td>' +
        '<td class="num">' + r.ranks + '</td>' +
        '<td class="num">' + formatNumber(r.papers_school_per_year) + '</td>' +
        '<td class="num">' + formatNumber(r.papers_faculty_per_year) + '</td>' +
        '<td class="num">' + formatNumber(r.citations_school_per_year) + '</td>' +
        '<td class="num">' + formatNumber(r.citations_faculty_per_year) + '</td>';
      tbody.appendChild(tr);
    });

    Array.prototype.forEach.call(document.querySelectorAll('#rankings-table th[data-col]'), function(th) {
      th.classList.remove('sorted');
      var arrow = th.querySelector('.sort-arrow');
      if (arrow) arrow.textContent = '';
      if (th.getAttribute('data-col') === sortCol) {
        th.classList.add('sorted');
        if (arrow) arrow.textContent = sortAsc ? '▲' : '▼';
      }
    });
  }

  document.getElementById('period-select').addEventListener('change', render);
  Array.prototype.forEach.call(document.querySelectorAll('.journal-cb'), function(cb) {
    cb.addEventListener('change', render);
  });
  Array.prototype.forEach.call(document.querySelectorAll('#rankings-table th[data-col]'), function(th) {
    th.addEventListener('click', function() {
      var col = th.getAttribute('data-col');
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = (col === 'name');
      }
      render();
    });
  });

  loadMetricData(render);
})();
</script>
